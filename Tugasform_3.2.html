<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta http-equiv="X-UA-Compatible" content="IE=edge">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <style>
        .header a{
            text-decoration: none;
            color: black;
        }


    </style>
    <title>Form</title>
</head>
<body>

    <div class="header" style="border: 1px solid black; margin: 50px;">
        <ul>
            <li style="display: inline-block; padding-right: 150px; padding-left: 50px; "><a href="#">Home :</a> </li>
            <li style="display: inline-block; padding-right: 150px;"><a href="#">Generate Link :</a> </li>
            <li style="display: inline-block; padding-right: 150px;"><a href="#">Transaction History :</a> </li>
            <li style="display: inline-block; padding-right: 150px;"><a href="#">Policy :</a> </li>
            <li style="display: inline-block; padding-right: 50px;"><a href="#">Logout :</a> </li>
        </ul>
     </div>

     <div class="section">
           <form action="">
               <table>
                    <tr>
                        <td><label for="form-title">Title Here</label></td>
                        <td>:</td>
                        <td><input type="search" name="title" id="form-title"></td>
                    </tr>

                    <tr>
                    <td><label for="form-desc">Description</label></td>
                    <td>:</td>
                    <td><textarea name="description" id="form-desc" cols="60" rows="6" placeholder="Search your specs laptop"></textarea></td>
                    </tr>
                    
                    <tr>
                        <td><label for="form-number">Account Number</label></td>
                        <td>:</td>
                        <td><input type="number" name="account-number" id="form-number" style="width: 325px;"></td>
                    </tr>

                    <tr>
                        <td><label for="form-bank">Bank</label></td>
                        <td>:</td>
                        <td><select name="bank" id="form-bank" size="1" style="width: 250px;">
                            <option value="1">Select Bank</option>
                            <option value="2"> BRI</option>
                            <option value="3">CIMB Niaga</option>
                            <option value="4"> Mandiri</option>
                            <option value="5"> BCA</option>
                        </select></td>
                    </tr>
                    
                    <tr>
                        <td><label for="form-name">Account Holder</label></td>
                        <td>:</td>
                        <td><input type="text" name="account-holder" id="form-name" style="width: 290px;"></td>
                    </tr>

                    <tr>
                        <td><label for="form-trans">Transaction</label></td>
                        <td>:</td>
                        <td><input type="number" name="transaction" id="form-trans" min="1" max="10" style="width: 30px;"></td>
                    </tr>

                    <tr>
                        <td></td>
                        <td></td>
                        <td> 
                            *if the transaction is for 3 person, choose 3 form the drop-drown list
                            <br>
                            <input type="checkbox" name="checklist">
                            <label for="form-checklist">Send to Mobile Phone</label>
                            <br>
                            <input type="checkbox" name="checklist" id="form-checklist">
                            <label for="checklict">Send to Mobile Phone</label>
                        </td>
                     </tr>

                     <tr>
                         <td><label for="form-phone">Send to Mobile Phone</label></td>
                         <td>:</td>
                         <td><input type="text" name="mobile-phone" id="form-phone" style="width: 300px;"></td>
                     </tr>

                     <tr>
                         <td><label for="form-email">Send to Email</label></td>
                         <td>:</td>
                         <td><input type="emal" name="costumeremail" id="form-email" style="width: 300px;"></td>
                         
                     </tr>
                     
                     <tr>
                         <td></td>
                         <td></td>
                         <td><input type="submit" value="Generate Nabr Link" 
                            style="margin-top: 40px; background-color: green; color: white;"></td>
                     </tr>







                
            </table>
        </form>
     </div>
    
</body>
</html>
